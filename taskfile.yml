version: '3'
# NIX_SSHOPTS: adds SSH keepalives so nix copy fails fast (90s) 
# instead of hanging on TCP timeout when remote host is unreachable.
env:
  NIX_SSHOPTS: -o ServerAliveInterval=30 -o ServerAliveCountMax=3
tasks:
  apps:
    deps: [krew, ollama]
  extensions:
    cmds:
      - cat home/.chezmoiscripts/run_onchange_01f_deps_extensions.sh.tmpl | chezmoi execute-template | zsh
  ollama:
    cmds:
      - cat home/.chezmoiscripts/run_onchange_01d_deps_ollamafile.sh.tmpl | chezmoi execute-template | zsh
  krew:
    cmds:
      - cat home/.chezmoiscripts/run_onchange_01h_deps_krew.sh.tmpl | chezmoi execute-template | zsh
  icons:
    cmds:
      - cat home/.chezmoiscripts/run_onchange_06_customize_icons.sh.tmpl | chezmoi execute-template | zsh
  wallpaper:
    cmds:
      - cat home/.chezmoiscripts/run_onchange_05_configure_wallpaper.sh.tmpl | chezmoi execute-template | zsh
  spicetify:
    cmds:
      - home/.chezmoiscripts/run_onchange_06_customize_spicetify.sh
  services:
    cmds:
      - home/.chezmoiscripts/run_onchange_04_configure_services_brew.sh
  agents:
    cmds:
      - home/.chezmoiscripts/run_onchange_04_configure_services_launch_agents.sh
  nix-setup-identity:
    desc: Create nix/identity.nix interactively (run once when forking or when identity changes)
    dir: nix
    cmds:
      - ./setup-identity.sh
  nix:
    desc: Apply nix configuration to all machines
    deps: [nix-max, nix-pi]
  nix-max:
    desc: Apply nix-darwin configuration to maxbook
    # nix-daemon (running as root via sudo) refuses world-readable SSH keys;
    # force 0600 here. nix-pi-* and nix-hetzner-* flip it back to 0644 for
    # oliver-as-user SSH. Yes, this is silly.
    # Guarded so hosts without a linux-builder (no key) don't abort the task.
    cmds:
      - '[ -f /etc/nix/builder_ed25519 ] && sudo chmod 600 /etc/nix/builder_ed25519 || true'
      - sudo /run/current-system/sw/bin/darwin-rebuild switch --flake "./nix#{{.HOSTNAME}}" --option warn-dirty false
    vars:
      HOSTNAME:
        sh: hostname -s
  nix-builder-restart:
    desc: Restart the linux-builder VM
    cmds:
      - sudo launchctl kickstart -k system/org.nixos.linux-builder
  nix-builder-force:
    desc: Force reset the linux-builder VM (recreates working dir, disk, and fixes key permissions)
    # bootout/bootstrap (not kickstart) because EX_CONFIG exits put launchd into
    # an extended-backoff state where kickstart no-ops. Unregistering and
    # re-registering wipes the error history so RunAtLoad triggers a fresh spawn.
    cmds:
      - sudo mkdir -p /var/lib/linux-builder
      - sudo rm -f /var/lib/linux-builder/nixos.qcow2
      - sudo launchctl bootout system/org.nixos.linux-builder || true
      - sudo launchctl bootstrap system /Library/LaunchDaemons/org.nixos.linux-builder.plist
      - sleep 30
      - sudo chmod 644 /etc/nix/builder_ed25519
  nix-kanata-force:
    desc: Force reload the kanata daemon and karabiner-vhid-daemon (bootout + bootstrap)
    # Same EX_CONFIG/extended-backoff reasoning as nix-builder-force. vhid daemon
    # cycles first so kanata comes up against a fresh IPC socket; see the
    # "stuck vhid state" recovery in nix/modules/darwin/kanata.nix.
    cmds:
      - sudo launchctl bootout system/org.nixos.karabiner-vhid-daemon || true
      - sudo launchctl bootstrap system /Library/LaunchDaemons/org.nixos.karabiner-vhid-daemon.plist
      - sudo launchctl bootout system/org.nixos.kanata || true
      - sudo launchctl bootstrap system /Library/LaunchDaemons/org.nixos.kanata.plist
  nix-pi:
    desc: Apply NixOS configuration to all pis
    deps: [nix-pi-1, nix-pi-2, nix-pi-3]
  nix-pi-1:
    desc: Apply NixOS configuration to pi-1
    dir: nix
    cmds:
      - sudo chmod 644 /etc/nix/builder_ed25519
      - nix run nixpkgs#nixos-rebuild -- switch --option warn-dirty false --option extra-substituters "https://nixos-raspberrypi.cachix.org" --option extra-trusted-public-keys "nixos-raspberrypi.cachix.org-1:4iMO9LXa8BqhU+Rpg6LQKiGa2lsNh/j2oiYLNOQ5sPI=" --flake .#pi-1 --target-host oliver@pi-1.local --build-host builder@linux-builder --sudo
  nix-pi-2:
    desc: Apply NixOS configuration to pi-2
    dir: nix
    cmds:
      - sudo chmod 644 /etc/nix/builder_ed25519
      - nix run nixpkgs#nixos-rebuild -- switch --option warn-dirty false --option extra-substituters "https://nixos-raspberrypi.cachix.org" --option extra-trusted-public-keys "nixos-raspberrypi.cachix.org-1:4iMO9LXa8BqhU+Rpg6LQKiGa2lsNh/j2oiYLNOQ5sPI=" --flake .#pi-2 --target-host oliver@pi-2.local --build-host builder@linux-builder --sudo
  nix-pi-3:
    desc: Apply NixOS configuration to pi-3
    dir: nix
    cmds:
      - sudo chmod 644 /etc/nix/builder_ed25519
      - nix run nixpkgs#nixos-rebuild -- switch --option warn-dirty false --option extra-substituters "https://nixos-raspberrypi.cachix.org" --option extra-trusted-public-keys "nixos-raspberrypi.cachix.org-1:4iMO9LXa8BqhU+Rpg6LQKiGa2lsNh/j2oiYLNOQ5sPI=" --flake .#pi-3 --target-host oliver@pi-3.local --build-host builder@linux-builder --sudo
  nix-hetzner-1:
    desc: Apply NixOS configuration to hetzner-1
    # Relies on a `Host hetzner-1` entry in ~/.ssh/config to resolve the public IP and user.
    dir: nix
    cmds:
      - sudo chmod 644 /etc/nix/builder_ed25519
      - nix run nixpkgs#nixos-rebuild -- switch --option warn-dirty false --flake .#hetzner-1 --target-host oliver@hetzner-1 --build-host builder@linux-builder --sudo
  tailscale-unas:
    desc: Install and configure Tailscale on UNAS2
    cmds:
      - ssh root@unas.local env "TAILSCALE_AUTHKEY=$(op read 'op://2udkjdngrnb6jlr62cd7iq33de/2imqxgbvx6htswijyuswh72kye/unas')" sh -s < scripts/setup-tailscale-unas.sh
  nix-update:
    desc: Update all flake inputs (nixpkgs, nixos-raspberrypi, etc.)
    dir: nix
    cmds:
      - nix flake update
  nix-update-nixpkgs:
    desc: Update only the nixpkgs input
    dir: nix
    cmds:
      - nix flake update nixpkgs
  nix-update-rpi:
    desc: Update only the nixos-raspberrypi input (RPi kernel/firmware)
    dir: nix
    cmds:
      - nix flake update nixos-raspberrypi
  nix-update-darwin:
    desc: Update only the nix-darwin input
    dir: nix
    cmds:
      - nix flake update nix-darwin
  nix-update-home-manager:
    desc: Update only the home-manager input
    dir: nix
    cmds:
      - nix flake update home-manager
  nix-fmt:
    desc: Format all nix files
    dir: nix
    cmds:
      - nix fmt --no-warn-dirty
  nix-gc:
    desc: Garbage-collect old generations and dedupe the nix store
    # sudo run cleans the system/darwin profile; the unprivileged run cleans
    # the user profile (home-manager, nix-shell roots). `optimise` hardlinks
    # identical files across the store after GC frees them up.
    cmds:
      - sudo nix-collect-garbage -d
      - nix-collect-garbage -d
      - nix store optimise
