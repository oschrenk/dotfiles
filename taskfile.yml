version: '3'
tasks:
  apps:
    deps: [cargo, go, krew, lua, node, ollama]
  cargo:
    cmds:
      - cat home/.chezmoiscripts/run_onchange_01b_deps_cargofile.sh.tmpl | chezmoi execute-template | zsh
  go:
    cmds:
      - cat home/.chezmoiscripts/run_onchange_01c_deps_gofile.sh.tmpl | chezmoi execute-template | zsh
  ollama:
    cmds:
      - cat home/.chezmoiscripts/run_onchange_01d_deps_ollamafile.sh.tmpl | chezmoi execute-template | zsh
  lua:
    cmds:
      - cat home/.chezmoiscripts/run_onchange_01e_deps_luarocks.sh.tmpl | chezmoi execute-template | zsh
  node:
    cmds:
      - cat home/.chezmoiscripts/run_onchange_01g_deps_node.sh.tmpl | chezmoi execute-template | zsh
  krew:
    cmds:
      - cat home/.chezmoiscripts/run_onchange_01h_deps_krew.sh.tmpl | chezmoi execute-template | zsh
  icons:
    cmds:
      - cat home/.chezmoiscripts/run_onchange_06_customize_icons.sh.tmpl | chezmoi execute-template | zsh
  spicetify:
    cmds:
      - home/.chezmoiscripts/run_onchange_05_terminal_fish.sh
  services:
    cmds:
      - home/.chezmoiscripts/run_onchange_04_configure_services_brew.sh
  agents:
    cmds:
      - home/.chezmoiscripts/run_onchange_04_configure_services_launch_agents.sh
  nix-pi-1:
    desc: Apply NixOS configuration to pi-1
    dir: nix
    cmds:
      - nix run nixpkgs#nixos-rebuild -- switch --flake .#pi-1 --target-host oliver@pi-1.local --build-host oliver@pi-1.local --sudo
  nix-pi-2:
    desc: Apply NixOS configuration to pi-2
    dir: nix
    cmds:
      - nix run nixpkgs#nixos-rebuild -- switch --flake .#pi-2 --target-host oliver@pi-2.local --build-host oliver@pi-2.local --sudo
  nix-pi-3:
    desc: Apply NixOS configuration to pi-3
    dir: nix
    cmds:
      - nix run nixpkgs#nixos-rebuild -- switch --flake .#pi-3 --target-host oliver@pi-3.local --build-host oliver@pi-3.local --sudo
  nix-fmt:
    desc: Format all nix files
    dir: nix
    cmds:
      - nix fmt --no-warn-dirty
  nix:
    desc: Apply nix-darwin configuration
    cmds:
      - sudo /run/current-system/sw/bin/darwin-rebuild switch --flake "./nix#{{.HOSTNAME}}"
    vars:
      HOSTNAME:
        sh: hostname -s
