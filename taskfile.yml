version: '3'
tasks:
  apps:
    deps: [cargo, go, krew, lua, node, ollama]
  cargo:
    cmds:
      - cat home/.chezmoiscripts/run_onchange_01b_deps_cargofile.sh.tmpl | chezmoi execute-template | zsh
  go:
    cmds:
      - cat home/.chezmoiscripts/run_onchange_01c_deps_gofile.sh.tmpl | chezmoi execute-template | zsh
  ollama:
    cmds:
      - cat home/.chezmoiscripts/run_onchange_01d_deps_ollamafile.sh.tmpl | chezmoi execute-template | zsh
  lua:
    cmds:
      - cat home/.chezmoiscripts/run_onchange_01e_deps_luarocks.sh.tmpl | chezmoi execute-template | zsh
  node:
    cmds:
      - cat home/.chezmoiscripts/run_onchange_01g_deps_node.sh.tmpl | chezmoi execute-template | zsh
  krew:
    cmds:
      - cat home/.chezmoiscripts/run_onchange_01h_deps_krew.sh.tmpl | chezmoi execute-template | zsh
  icons:
    cmds:
      - cat home/.chezmoiscripts/run_onchange_06_customize_icons.sh.tmpl | chezmoi execute-template | zsh
  spicetify:
    cmds:
      - home/.chezmoiscripts/run_onchange_05_terminal_fish.sh
  services:
    cmds:
      - home/.chezmoiscripts/run_onchange_04_configure_services_brew.sh
  agents:
    cmds:
      - home/.chezmoiscripts/run_onchange_04_configure_services_launch_agents.sh
  nix-setup-local:
    desc: Create nix/local.nix interactively (machine-local, never committed, run once per machine)
    dir: nix
    cmds:
      - ./setup-local.sh
  nix:
    desc: Apply nix configuration to all machines
    deps: [nix-max, nix-pi]
  nix-guard-local:
    desc: Register nix/local.nix in git index so Nix can evaluate it (run after nix-unguard-local)
    cmds:
      - test -f nix/local.nix || (echo "nix/local.nix not found — run 'task nix-setup-local' first" && exit 1)
      # Nix flakes only evaluate files in the git index. --intent-to-add registers
      # the path without staging any content, making local.nix visible to Nix.
      - git add --intent-to-add nix/local.nix 2>/dev/null || true
      # --assume-unchanged stops git tracking changes to this file: git status
      # won't show it and git add . won't stage it. An explicit
      # `git add nix/local.nix` would still stage it — be careful.
      - git update-index --assume-unchanged nix/local.nix 2>/dev/null || true
  nix-unguard-local:
    desc: Remove nix/local.nix from git index so git operations (rebase, stash) work cleanly
    cmds:
      - git restore --staged nix/local.nix 2>/dev/null || true
  nix-max:
    desc: Apply nix-darwin configuration to maxbook
    deps: [nix-guard-local]
    cmds:
      - sudo /run/current-system/sw/bin/darwin-rebuild switch --flake "./nix#{{.HOSTNAME}}" --option warn-dirty false
    vars:
      HOSTNAME:
        sh: hostname -s
  nix-pi:
    desc: Apply NixOS configuration to all pis
    deps: [nix-pi-1, nix-pi-2, nix-pi-3]
  nix-pi-1:
    desc: Apply NixOS configuration to pi-1
    deps: [nix-guard-local]
    dir: nix
    cmds:
      - nix run nixpkgs#nixos-rebuild -- switch --option warn-dirty false --flake .#pi-1 --target-host oliver@pi-1.local --build-host oliver@pi-1.local --sudo
  nix-pi-2:
    desc: Apply NixOS configuration to pi-2
    deps: [nix-guard-local]
    dir: nix
    cmds:
      - nix run nixpkgs#nixos-rebuild -- switch --option warn-dirty false --flake .#pi-2 --target-host oliver@pi-2.local --build-host oliver@pi-2.local --sudo
  nix-pi-3:
    desc: Apply NixOS configuration to pi-3
    deps: [nix-guard-local]
    dir: nix
    cmds:
      - nix run nixpkgs#nixos-rebuild -- switch --option warn-dirty false --flake .#pi-3 --target-host oliver@pi-3.local --build-host oliver@pi-3.local --sudo
  tailscale-unas:
    desc: Install and configure Tailscale on UNAS2
    cmds:
      - ssh root@unas.local env "TAILSCALE_AUTHKEY=$(op read 'op://2udkjdngrnb6jlr62cd7iq33de/2imqxgbvx6htswijyuswh72kye/unas')" sh -s < scripts/setup-tailscale-unas.sh
  nix-update:
    desc: Update all flake inputs (nixpkgs, nixos-raspberrypi, etc.)
    dir: nix
    cmds:
      - nix flake update
  nix-update-nixpkgs:
    desc: Update only the nixpkgs input
    dir: nix
    cmds:
      - nix flake update nixpkgs
  nix-update-rpi:
    desc: Update only the nixos-raspberrypi input (RPi kernel/firmware)
    dir: nix
    cmds:
      - nix flake update nixos-raspberrypi
  nix-fmt:
    desc: Format all nix files
    dir: nix
    cmds:
      - nix fmt --no-warn-dirty
